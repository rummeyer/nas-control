<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Synology NAS-Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 720px; width: 100%; padding: 2rem; }
  .header { display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1.5rem; margin-bottom: 2rem; }
  .logo { grid-row: 1; grid-column: 1; display: flex; align-items: center; }
  .logo svg { display: block; }
  h1 { grid-row: 1; grid-column: 2; font-size: 1.8rem; color: #f8fafc; align-self: center; text-align: right; }
  .subtitle { grid-row: 2; grid-column: 1; color: #94a3b8; font-size: 0.95rem; }
  .ver-row { grid-row: 2; grid-column: 2; color: #94a3b8; font-size: 0.95rem; display: flex; align-items: center; justify-content: flex-end; }
  .status-bar { background: #1e293b; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .status-bar .label { font-size: 0.9rem; color: #94a3b8; }
  .status-bar .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 0.5rem; }
  .status-bar .state { display: flex; align-items: center; font-weight: 600; }
  .dot.online { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
  .dot.offline { background: #ef4444; box-shadow: 0 0 8px #ef444488; }
  .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .actions { display: flex; gap: 0.75rem; margin-bottom: 2rem; }
  button { flex: 1; padding: 0.75rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-on { background: #22c55e; color: #052e16; }
  .btn-off { background: #ef4444; color: #450a0a; }
  .log { background: #1e293b; border-radius: 12px; padding: 1rem 1.25rem; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.8rem; color: #94a3b8; height: 11.5rem; overflow-y: auto; }
  .log p { margin-bottom: 0.25rem; }
  .log .ok { color: #22c55e; }
  .log .err { color: #ef4444; }
  .api-info { margin-top: 2rem; background: #1e293b; border-radius: 12px; padding: 1.25rem; }
  .api-info h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #f8fafc; }
  .endpoint { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
  .method { font-family: monospace; font-weight: 700; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
  .method.get { background: #1d4ed8; color: #bfdbfe; }
  .method.post { background: #b45309; color: #fef3c7; }
  .path { font-family: monospace; color: #e2e8f0; text-decoration: none; }
  a.path:hover { text-decoration: underline; }
  .desc { color: #64748b; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="72" viewBox="0 0 64 72" fill="none">
        <!-- NAS enclosure -->
        <rect x="2" y="2" width="60" height="68" rx="5" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <!-- Front panel inset -->
        <rect x="6" y="6" width="52" height="52" rx="3" fill="#0f172a"/>
        <!-- Drive bay 1 -->
        <rect x="9" y="9" width="10" height="46" rx="2" fill="#1a2332" stroke="#475569" stroke-width="1"/>
        <rect x="11" y="14" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <rect x="11" y="17" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <circle cx="14" cy="50" r="1.2" fill="#22c55e" opacity="0.9"/>
        <circle cx="14" cy="50" r="3" fill="#22c55e" opacity="0.12"/>
        <!-- Drive bay 2 -->
        <rect x="21" y="9" width="10" height="46" rx="2" fill="#1a2332" stroke="#475569" stroke-width="1"/>
        <rect x="23" y="14" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <rect x="23" y="17" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <circle cx="26" cy="50" r="1.2" fill="#22c55e" opacity="0.7"/>
        <circle cx="26" cy="50" r="3" fill="#22c55e" opacity="0.1"/>
        <!-- Drive bay 3 -->
        <rect x="33" y="9" width="10" height="46" rx="2" fill="#1a2332" stroke="#475569" stroke-width="1"/>
        <rect x="35" y="14" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <rect x="35" y="17" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <circle cx="38" cy="50" r="1.2" fill="#22c55e" opacity="0.8"/>
        <circle cx="38" cy="50" r="3" fill="#22c55e" opacity="0.1"/>
        <!-- Drive bay 4 -->
        <rect x="45" y="9" width="10" height="46" rx="2" fill="#1a2332" stroke="#475569" stroke-width="1"/>
        <rect x="47" y="14" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <rect x="47" y="17" width="6" height="1.5" rx="0.5" fill="#334155"/>
        <circle cx="50" cy="50" r="1.2" fill="#22c55e" opacity="0.6"/>
        <circle cx="50" cy="50" r="3" fill="#22c55e" opacity="0.08"/>
        <!-- Power button -->
        <circle cx="32" cy="64" r="3" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="13 4.9" stroke-dashoffset="3.5"/>
        <line x1="32" y1="61" x2="32" y2="63" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Status LED -->
        <circle cx="10" cy="64" r="1.5" fill="#3b82f6" opacity="0.8"/>
        <circle cx="10" cy="64" r="3.5" fill="#3b82f6" opacity="0.1"/>
      </svg>
    </div>
    <h1>Synology<br>NAS-Control</h1>
    <div class="subtitle"><span id="nasIp"></span><br><span id="nasMac"></span></div>
    <div class="ver-row"><span id="ver"></span></div>
  </div>

  <div class="status-bar">
    <span class="label">Status</span>
    <span class="state"><span id="dot" class="dot loading"></span><span id="stateText">...</span></span>
  </div>

  <div class="actions">
    <button class="btn-on" id="btnOn" onclick="doAction('/on')">Einschalten</button>
    <button class="btn-off" id="btnOff" onclick="doAction('/off')">Ausschalten</button>
  </div>

  <div class="log" id="log"></div>

  <div class="api-info">
    <h2>API Endpoints</h2>
    <div class="endpoint"><span class="method get">GET</span><a class="path" href="/state">/state</a><span class="desc">&mdash; Check if NAS is online</span></div>
    <div class="endpoint"><span class="method get">GET</span><a class="path" href="/info">/info</a><span class="desc">&mdash; NAS IP, MAC and server version</span></div>
    <div class="endpoint"><span class="method post">POST</span><a class="path" href="/on">/on</a><span class="desc">&mdash; Send Wake-on-LAN packet</span></div>
    <div class="endpoint"><span class="method post">POST</span><a class="path" href="/off">/off</a><span class="desc">&mdash; Graceful shutdown via DSM API</span></div>
    <div class="endpoint"><span class="method post">POST</span><a class="path" href="/kill">/kill</a><span class="desc">&mdash; Stop this server process</span></div>
  </div>
</div>
<script>
  const dot = document.getElementById("dot");
  const stateText = document.getElementById("stateText");
  const logEl = document.getElementById("log");

  function log(msg, cls) {
    const p = document.createElement("p");
    p.className = cls || "";
    const now = new Date().toLocaleTimeString();
    p.textContent = now + "  " + msg;
    logEl.prepend(p);
  }

  async function checkState() {
    dot.className = "dot loading";
    stateText.textContent = "...";
    try {
      const r = await fetch("/state");
      const d = await r.json();
      const on = d.message === "online";
      dot.className = "dot " + (on ? "online" : "offline");
      stateText.textContent = on ? "Online" : "Offline";
    } catch(e) {
      dot.className = "dot offline";
      stateText.textContent = "Fehler";
    }
  }

  async function doAction(path) {
    const name = path === "/on" ? "Einschalten" : "Ausschalten";
    document.getElementById("btnOn").disabled = true;
    document.getElementById("btnOff").disabled = true;
    log(name + " ...");
    try {
      const r = await fetch(path, {method: "POST"});
      const d = await r.json();
      if (d.status === "ok") { log(d.message, "ok"); }
      else { log(d.message, "err"); }
    } catch(e) { log("Fehler: " + e.message, "err"); }
    document.getElementById("btnOn").disabled = false;
    document.getElementById("btnOff").disabled = false;
    setTimeout(checkState, 3000);
  }

  // Load NAS IP from info endpoint
  fetch("/info").then(r => r.json()).then(d => {
    document.getElementById("nasIp").textContent = d.nas_ip;
    document.getElementById("nasMac").textContent = d.mac;
    document.getElementById("ver").textContent = "v" + d.version;
  });

  checkState();
  setInterval(checkState, 30000);
</script>
</body>
</html>
